<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="프로젝트 큐레이션 페이지 - 그동안 개발한 이런저런 프로젝트를 한곳에서 모아둠">
    <title>프로젝트 큐레이션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        dark: '#030712',
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'shimmer': 'shimmer 2s linear infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        shimmer: {
                            from: { backgroundPosition: '200% 0' },
                            to: { backgroundPosition: '-200% 0' },
                        }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #030712;
            color: #f3f4f6;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }
        
        .glass-card:hover {
            transform: translateY(-12px) scale(1.02);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.7), 0 0 20px rgba(99, 102, 241, 0.1);
        }

        /* Card Border Glow Effect */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255, 255, 255, 0.05),
                transparent
            );
            transition: 0.6s;
            z-index: 1;
        }

        .glass-card:hover::before {
            left: 100%;
        }

        .card-number {
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 8rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.02);
            line-height: 1;
            user-select: none;
            pointer-events: none;
            z-index: 0;
            transition: 0.5s ease;
        }

        .glass-card:hover .card-number {
            color: rgba(255, 255, 255, 0.04);
            transform: scale(1.1) translate(-10px, 10px);
        }

        .tag-pill {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.025em;
            transition: all 0.3s ease;
        }

        .tag-pill:hover {
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }

        .action-button {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            font-weight: 600;
            border-radius: 12px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }

        .action-button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.5);
            letter-spacing: 0.5px;
        }

        .skeleton-dark {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.02) 25%, rgba(255, 255, 255, 0.06) 50%, rgba(255, 255, 255, 0.02) 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        .text-gradient {
            background: linear-gradient(135deg, #ffffff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.4;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: #4f46e5;
            top: -150px;
            left: -100px;
            animation: blob 7s infinite;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: #9333ea;
            top: 20%;
            right: -100px;
            animation: blob 7s infinite;
            animation-delay: 2s;
        }

        .orb-3 {
            width: 600px;
            height: 600px;
            background: #2563eb;
            bottom: -200px;
            left: 10%;
            animation: blob 7s infinite;
            animation-delay: 4s;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #818cf8;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #030712;
        }

        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4b5563;
        }

        .noise-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
    </style>
</head>

<body class="min-h-screen relative font-sans selection:bg-indigo-500/30">
    <div class="fixed top-8 right-8 z-50">
        <a href="https://github.com/tramper2/masterPages/issues/new?labels=project" target="_blank" rel="noopener noreferrer" 
           class="glass-card px-6 py-3 rounded-2xl flex items-center gap-3 text-sm font-bold text-white hover:border-indigo-500/50 hover:bg-indigo-500/10 transition-all group">
            <span class="w-8 h-8 rounded-xl bg-indigo-500/20 flex items-center justify-center group-hover:bg-indigo-500 group-hover:scale-110 transition-all duration-300">
                <svg class="w-4 h-4 text-indigo-300 group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path>
                </svg>
            </span>
            <span class="tracking-tight">프로젝트 등록</span>
        </a>
    </div>

    <div class="noise-bg pointer-events-none"></div>
    <div class="bg-orb orb-1 pointer-events-none"></div>
    <div class="bg-orb orb-2 pointer-events-none"></div>
    <div class="bg-orb orb-3 pointer-events-none"></div>

    <div class="container mx-auto px-4 py-20 max-w-7xl relative z-10">
        <header class="text-center mb-24">
            <div
                class="inline-flex items-center justify-center px-4 py-1.5 mb-8 rounded-full glass-card text-sm font-medium text-indigo-300">
                <span class="flex w-2 h-2 rounded-full bg-indigo-400 mr-2 animate-pulse"></span>
                Projects & Curation
            </div>
            <h1 class="text-5xl md:text-7xl font-bold mb-6 tracking-tight text-gradient">
                프로젝트 큐레이션
            </h1>
            <p class="text-lg md:text-xl text-zinc-400 max-w-2xl mx-auto font-light leading-relaxed">
                그동안 개발한 다채로운 프로젝트들을 모아둠.
            </p>
        </header>

        <div id="loading-state" class="flex flex-col items-center justify-center py-32">
            <div class="spinner mb-6"></div>
            <p class="text-zinc-400 font-medium tracking-wide">프로젝트를 불러오는 중입니다...</p>
        </div>

        <div id="error-state" class="hidden max-w-md mx-auto">
            <div class="glass-card rounded-2xl p-10 text-center border-red-500/20 bg-red-500/5">
                <svg class="w-16 h-16 text-red-400 mx-auto mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                    </path>
                </svg>
                <h3 class="text-xl font-semibold text-red-200 mb-3">데이터를 불러올 수 없습니다</h3>
                <p class="text-red-400/80 mb-8" id="error-message">네트워크 연결을 확인해주세요</p>
                <button onclick="fetchProjects()"
                    class="bg-red-500/10 hover:bg-red-500/20 text-red-300 border border-red-500/20 font-medium py-2.5 px-8 rounded-xl transition-all">
                    다시 시도
                </button>
            </div>
        </div>

        <div id="empty-state" class="hidden max-w-lg mx-auto">
            <div class="glass-card rounded-2xl p-16 text-center">
                <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg class="w-10 h-10 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                        </path>
                    </svg>
                </div>
                <h3 class="text-2xl font-semibold text-zinc-200 mb-3">등록된 프로젝트가 없습니다</h3>
                <p class="text-zinc-500">첫 번째 프로젝트를 등록하여 큐레이션을 시작해보세요!</p>
            </div>
        </div>

        <div id="skeleton-grid" class="hidden grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
        </div>

        <div id="projects-grid" class="hidden grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
        </div>

        <footer class="mt-32 text-center">
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full glass-card text-xs text-zinc-500">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.6.113.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z" />
                </svg>
                Powered by ArtractiveHandsome man
            </div>
        </footer>
    </div>

    <script src="assets/js/app.js"></script>
</body>

</html>
